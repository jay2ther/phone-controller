<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Party Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: 0.3s; }
        input { color: CanvasText; background-color: Canvas; }
        
        /* Tactile Button Animations (The "Squish" Effect) */
        button {
            transition: transform 0.05s ease, filter 0.05s ease;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        
        button:active {
            transform: scale(0.92); /* Shrinks slightly on press */
            filter: brightness(0.8); /* Dims slightly on press */
        }
        
        /* Dark Mode Color Mapping */
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #ffffff; }
            h2, p { color: #cccccc; }
            input { border: 2px solid #555 !important; }
        }
    </style>
</head>
<body>

    <div id="login" style="margin-top: 50px;">
        <h1 style="font-size: 40px; margin-bottom: 10px;">PARTY GAME</h1>
        <p style="margin-bottom: 30px;">Look at the TV for the Room Code!</p>
        
        <input type="text" id="playerName" placeholder="Your Name" 
               style="font-size:24px; padding:15px; width:80%; margin-bottom:15px; text-align: center; border-radius: 10px; border: 2px solid #ccc;"><br>
               
        <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="4" 
               style="text-transform:uppercase; font-size:24px; padding:15px; width:80%; margin-bottom:30px; text-align: center; border-radius: 10px; border: 2px solid #ccc;"><br>
               
        <button onclick="joinGame()" 
                style="font-size:24px; padding:20px; width:85%; background:#4CAF50; color:white; border-radius:15px; border: none; font-weight: bold;">
            JOIN GAME
        </button>
    </div>

    <div id="bettingScreen" style="display:none; margin-top: 20px;">
        <h2 id="statusText" style="margin-bottom: 5px;">You're in!</h2>
        <h3 id="bankText" style="color: #4CAF50; margin-top: 0px; margin-bottom: 20px;">Bank: $0</h3>
        
        <h2>Place Your Bet</h2>
        <h1 id="betDisplay" style="font-size: 60px; margin: 10px; color: #f44336;">$10</h1>
        
        <input type="range" id="betSlider" min="10" max="100" step="10" value="10" 
               oninput="updateBetDisplay()" 
               style="width: 80%; height: 40px; margin-bottom: 40px;">
        <br>
        <button onclick="placeBet()" 
                style="width:80%; height:80px; font-size:30px; background:#f44336; color:white; border-radius:10px; border:none; font-weight:bold;">
            LOCK IN BET
        </button>
    </div>

    <div id="waitingScreen" style="display:none; margin-top: 100px;">
        <div id="waitingContent">
            <h2>Bet Locked!</h2>
            <p style="font-size: 20px;">Look at the TV, waiting for others...</p>
        </div>
    </div>

    <div id="actionScreen" style="display:none; margin-top: 50px;">
        <h2 style="color: #2196F3; font-size: 35px;">It's Your Turn!</h2>
        <br>
        <button onclick="sendAction('hit')" style="width:40%; height:120px; font-size:30px; background:#2196F3; color:white; border-radius:10px; margin-right:5%; border:none; font-weight:bold;">HIT</button>
        <button onclick="sendAction('stand')" style="width:40%; height:120px; font-size:30px; background:#f44336; color:white; border-radius:10px; border:none; font-weight:bold;">STAND</button>
    </div>

    <script src="app.js?v=7"></script>
</body>
</html>
