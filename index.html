<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Controller</title>
</head>
<body style="font-family: sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; text-align: center;">

    <div id="login" style="margin-top: 50px;">
        <h1 style="font-size: 40px; margin-bottom: 10px;">PARTY GAME</h1>
        <p style="margin-bottom: 30px;">Look at the TV for the Room Code!</p>
        
        <input type="text" id="playerName" placeholder="Your Name" 
               style="font-size:24px; padding:15px; width:80%; margin-bottom:15px; text-align: center; border-radius: 10px; border: 2px solid #ccc;"><br>
               
        <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="4" 
               style="text-transform:uppercase; font-size:24px; padding:15px; width:80%; margin-bottom:30px; text-align: center; border-radius: 10px; border: 2px solid #ccc;"><br>
               
        <button onclick="joinGame()" 
                style="font-size:24px; padding:20px; width:85%; background:#4CAF50; color:white; border-radius:15px; border: none; font-weight: bold;">
            JOIN GAME
        </button>
    </div>

    <div id="bettingScreen" style="display:none; margin-top: 20px;">
        <h2 id="statusText" style="margin-bottom: 5px;">You're in!</h2>
        <h3 id="bankText" style="color: #4CAF50; margin-top: 0px; margin-bottom: 20px;">Bank: $0</h3>
        
        <h2 style="color: #333;">Place Your Bet</h2>
        <h1 id="betDisplay" style="font-size: 60px; margin: 10px; color: #f44336;">$10</h1>
